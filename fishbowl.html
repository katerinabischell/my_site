<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishbowl</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #040d1a;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        canvas { display: block; }

        /* ── Loading screen ── */
        #loading {
            position: fixed;
            inset: 0;
            background: #040d1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.9s ease;
        }
        #loading.fade-out { opacity: 0; pointer-events: none; }

        .loader-title {
            color: #7dd8e0;
            font-size: 1.3rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }
        .progress-bar {
            width: 180px;
            height: 1.5px;
            background: rgba(125, 216, 224, 0.18);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #7dd8e0;
            width: 0%;
            transition: width 0.25s ease;
        }
        .loader-sub {
            color: rgba(125, 216, 224, 0.35);
            font-size: 0.7rem;
            letter-spacing: 0.18em;
            margin-top: 1.4rem;
        }

        /* ── Controls hint ── */
        #hint {
            position: fixed;
            bottom: 1.6rem;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.28);
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            pointer-events: none;
            transition: opacity 1.2s ease;
            white-space: nowrap;
        }
        #hint.gone { opacity: 0; }
    </style>
</head>
<body>

<div id="loading">
    <div class="loader-title">Fishbowl</div>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="loader-sub" id="loader-sub">Loading scene…</div>
</div>

<div id="hint">drag to look around &nbsp;·&nbsp; scroll to zoom</div>

<!-- Three.js import map — no build step needed -->
<script type="importmap">
{
    "imports": {
        "three":          "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─────────────────────────────────────────────────────────────────
// RENDERER
// ─────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping        = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.outputColorSpace   = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ─────────────────────────────────────────────────────────────────
// SCENE
// ─────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x061520);

// Exponential fog approximates the Volume Scatter water —
// objects farther away fade into teal murk
scene.fog = new THREE.FogExp2(0x0c3040, 0.30);

// ─────────────────────────────────────────────────────────────────
// CAMERA
// ─────────────────────────────────────────────────────────────────
// Blender uses Z-up. GLTF/Three.js uses Y-up.
// The GLTF exporter converts coordinates: Blender(x,y,z) → Three.js(x, z, -y)
//
// Blender cam position  (0, -1.50,  0.05) → Three.js (0,  0.05,  1.50)
// Blender look target  (0.15, 0.80, -0.45) → Three.js (0.15, -0.45, -0.80)
const camera = new THREE.PerspectiveCamera(
    60,                                    // FOV (Blender was 24mm ≈ 73°, we soften to 60)
    window.innerWidth / window.innerHeight,
    0.01,
    100
);
camera.position.set(0, 0.05, 1.50);

// ─────────────────────────────────────────────────────────────────
// ORBIT CONTROLS — user orbits from inside the bowl
// ─────────────────────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0.15, -0.45, -0.80);
controls.enableDamping  = true;
controls.dampingFactor  = 0.055;
controls.rotateSpeed    = 0.45;
controls.zoomSpeed      = 0.65;
controls.minDistance    = 0.05;   // can get nose-close to seaweed
controls.maxDistance    = 1.70;   // bowl interior radius ~1.88 — stay inside
controls.update();

// ─────────────────────────────────────────────────────────────────
// LIGHTING  (approximates the Cycles light rig)
// ─────────────────────────────────────────────────────────────────

// Ambient — deep underwater fill
const ambient = new THREE.AmbientLight(0x183c50, 2.2);
scene.add(ambient);

// Main "sun" from above — stands in for Godray_Spot
const sun = new THREE.DirectionalLight(0xa8ddf0, 3.5);
sun.position.set(1.2, 5.0, 0.8);
scene.add(sun);

// Secondary fill from opposite side — stands in for Soft_Shaft
const fill = new THREE.DirectionalLight(0x3a7a99, 1.4);
fill.position.set(-1.0, 3.0, -1.0);
scene.add(fill);

// Floor warm light (Floor_Light)
const floorLight = new THREE.PointLight(0xffe0a0, 5.0, 3.2);
floorLight.position.set(0.15, -1.05, -0.45);
scene.add(floorLight);

// Floor left — green tint for moss (Floor_Light_L)
const floorLightL = new THREE.PointLight(0x70dd99, 3.0, 2.8);
floorLightL.position.set(-0.45, -1.10, -0.20);
scene.add(floorLightL);

// Coral glow lights
const coralO = new THREE.PointLight(0xff6010, 2.2, 1.8);
coralO.position.set(0.40, -1.20, -0.25);
scene.add(coralO);

const coralP = new THREE.PointLight(0xff40aa, 2.0, 1.8);
coralP.position.set(-0.20, -1.20, -0.20);
scene.add(coralP);

// ─────────────────────────────────────────────────────────────────
// FAKE GOD RAYS
// Additive back-face cones — cheap volumetric shaft look
// ─────────────────────────────────────────────────────────────────
function makeRay(hexColor, x, z, height, radius, opacity) {
    const geo = new THREE.ConeGeometry(radius, height, 10, 1, true);
    const mat = new THREE.MeshBasicMaterial({
        color:      hexColor,
        transparent: true,
        opacity,
        side:       THREE.BackSide,
        depthWrite: false,
        blending:   THREE.AdditiveBlending,
    });
    const cone = new THREE.Mesh(geo, mat);
    // Tip at top of bowl, wide end pointing down
    cone.rotation.z = Math.PI;
    cone.position.set(x, height * 0.5 - 0.1, z);
    return cone;
}

const ray1 = makeRay(0x38b8d0, 0.25, -0.30, 3.6, 0.38, 0.045);
const ray2 = makeRay(0x58d0e0, -0.25, -0.10, 3.3, 0.28, 0.032);
const ray3 = makeRay(0x78e0f0, 0.55, -0.55, 3.0, 0.22, 0.028);
scene.add(ray1, ray2, ray3);

// ─────────────────────────────────────────────────────────────────
// CREATURE DEFINITIONS
// scale      — overall size (adjust if too big/small)
// faceOffset — Y rotation fix: 0 = forward, Math.PI = flip 180°
// rollFix    — Z rotation fix for sideways tilt (radians)
// behavior   — 'fish' | 'jellyfish' | 'crab'
// params     — behavior-specific motion settings
// ─────────────────────────────────────────────────────────────────
const CREATURES = [
    {
        file: 'fish___betta_splendens.glb',
        scale: 0.45,  faceOffset: 0,  rollFix: 0,
        behavior: 'fish',
        params: { radius: 0.60, baseY: -0.55, speed: 0.17, startAngle: 2.1,  wiggleFreq: 4.2, wiggleAmp: 0.30 },
    },
    {
        file: 'koi_fish.glb',
        scale: 0.0065, faceOffset: 0, rollFix: 0,
        behavior: 'fish',
        params: { radius: 0.42, baseY: -0.35, speed: 0.13, startAngle: 4.5,  wiggleFreq: 3.2, wiggleAmp: 0.25 },
    },
    {
        file: 'jelly_fish_spongebob.glb',
        scale: 2.0,   faceOffset: 0,  rollFix: 0,
        behavior: 'jellyfish',
        params: { baseY: 0.10, bobAmp: 0.42, bobFreq: 0.55, driftRadius: 0.38, driftFreqX: 0.19, driftFreqZ: 0.14, pulseFreq: 2.2 },
    },
    {
        file: 'little_hermit_crab.glb',
        scale: 0.07,  faceOffset: 0,  rollFix: 0,
        behavior: 'crab',
        params: { floorY: -1.22, z: -0.28, xRange: 0.70, speed: 0.18 },
    },
];

// Live creature instances — populated after each GLB loads
const creatureInstances = [];
const mixers            = [];

// ─────────────────────────────────────────────────────────────────
// LOAD GLB — scene first, then all creatures
// ─────────────────────────────────────────────────────────────────
const progressEl = document.getElementById('progress');
const loadingEl  = document.getElementById('loading');
const subEl      = document.getElementById('loader-sub');

let fadedOut = false;
function fadeOut() {
    if (fadedOut) return;
    fadedOut = true;
    progressEl.style.width = '100%';
    setTimeout(() => {
        loadingEl.classList.add('fade-out');
        setTimeout(() => { loadingEl.style.display = 'none'; }, 950);
    }, 300);
    setTimeout(() => document.getElementById('hint').classList.add('gone'), 6000);
}
setTimeout(fadeOut, 25000); // hard failsafe

const loader = new GLTFLoader();

loader.load(
    'fishbowl.glb',
    (gltf) => {
        scene.add(gltf.scene);
        gltf.scene.traverse((obj) => {
            if (!obj.isMesh) return;
            const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
            mats.forEach(m => {
                if (m.transparent) m.depthWrite = false;
                if (m.emissive) {
                    const e = m.emissiveIntensity ?? 1.0;
                    m.emissiveIntensity = Math.min(e * 2.8, 4.0);
                }
                if (obj.name.toLowerCase().includes('seaweed')) m.side = THREE.DoubleSide;
            });
        });

        subEl.textContent = 'Loading creatures…';
        let doneCount = 0;

        CREATURES.forEach((c, i) => {
            const cLoader = new GLTFLoader();
            cLoader.load(
                c.file,
                (gltf) => {
                    const root = gltf.scene;
                    root.scale.setScalar(c.scale);
                    root.rotation.y = c.faceOffset;
                    root.rotation.z = c.rollFix;

                    // Force all materials visible — some Sketchfab models have
                    // opacity=0 or fully transparent defaults that make them invisible
                    root.traverse(obj => {
                        if (!obj.isMesh) return;
                        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
                        mats.forEach(m => {
                            if (m.opacity < 0.15) m.opacity = 0.85;
                            m.transparent  = m.opacity < 1.0;
                            m.depthWrite   = !m.transparent;
                            m.side         = THREE.DoubleSide;
                            m.alphaTest    = 0;
                            m.needsUpdate  = true;
                        });
                    });

                    const group = new THREE.Group();
                    group.add(root);
                    scene.add(group);

                    const mixer = new THREE.AnimationMixer(root);
                    if (gltf.animations.length > 0) {
                        gltf.animations.forEach(clip => {
                            const action = mixer.clipAction(clip);
                            action.time = i * 0.5;
                            action.play();
                        });
                    }
                    mixers.push(mixer);

                    // Store state needed by the animate loop
                    const state = { group, root, mixer, behavior: c.behavior, params: { ...c.params, scale: c.scale }, faceOffset: c.faceOffset, rollFix: c.rollFix };
                    // Fish and crab need a mutable angle / phase tracker
                    if (c.behavior === 'fish')  state.angle = c.params.startAngle;
                    if (c.behavior === 'crab')  state.phase = Math.random() * Math.PI * 2;
                    creatureInstances.push(state);

                    doneCount++;
                    if (doneCount === CREATURES.length) fadeOut();
                },
                null,
                (err) => {
                    console.warn(`${c.file} skipped:`, err);
                    doneCount++;
                    if (doneCount === CREATURES.length) fadeOut();
                }
            );
        });
    },
    (xhr) => { if (xhr.total) progressEl.style.width = ((xhr.loaded / xhr.total) * 85) + '%'; },
    (err) => {
        console.error('fishbowl.glb error:', err);
        subEl.textContent = 'Run: python3 -m http.server 8000  then open localhost:8000/fishbowl.html';
        subEl.style.color = '#ff8080';
    }
);

// ─────────────────────────────────────────────────────────────────
// ANIMATION LOOP
// ─────────────────────────────────────────────────────────────────
const clock   = new THREE.Clock();
const _lookAt = new THREE.Vector3();

function fishPath(a, p) {
    // Two overlapping sine waves → natural wandering figure-8
    return {
        x: Math.cos(a)       * p.radius + Math.cos(a * 0.7 + 1.0) * 0.18,
        z: Math.sin(a * 1.1) * p.radius + Math.sin(a * 0.5)       * 0.16,
        y: p.baseY + Math.sin(a * 1.6) * 0.09,
    };
}

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    const t     = clock.elapsedTime;

    // ── Lights pulse ──
    coralO.intensity     = 2.2 + Math.sin(t * 1.30) * 0.45;
    coralP.intensity     = 2.0 + Math.sin(t * 0.90 + 1.1) * 0.40;
    floorLight.intensity = 5.0 + Math.sin(t * 0.55) * 0.35;

    // ── God ray drift ──
    ray1.rotation.y = Math.sin(t * 0.28) * 0.06;
    ray2.rotation.y = Math.sin(t * 0.22 + 0.9) * 0.05;
    ray3.rotation.y = Math.sin(t * 0.34 + 1.8) * 0.07;

    // ── Creatures ──
    creatureInstances.forEach(inst => {
        const { group, root, mixer, behavior, params, faceOffset, rollFix } = inst;

        if (behavior === 'fish') {
            inst.angle += params.speed * delta;
            const cur  = fishPath(inst.angle, params);
            const next = fishPath(inst.angle + 0.12, params);

            group.position.set(cur.x, cur.y, cur.z);
            _lookAt.set(next.x, cur.y, next.z);
            group.lookAt(_lookAt);

            // Body undulation — tail wag relative to travel direction
            root.rotation.y = faceOffset + Math.sin(t * params.wiggleFreq) * params.wiggleAmp;
            // Re-apply roll correction every frame (lookAt on group can affect child euler)
            root.rotation.z = rollFix ?? 0;
        }

        if (behavior === 'jellyfish') {
            // Asymmetric vertical bob — rises quickly, sinks slowly (real jellyfish)
            const raw  = Math.sin(t * params.bobFreq);
            const bob  = raw > 0 ? Math.pow(raw, 0.5) : -Math.pow(-raw, 1.6);
            const y    = params.baseY + bob * params.bobAmp;

            // Lazy horizontal drift — Lissajous keeps it from repeating exactly
            const x = Math.sin(t * params.driftFreqX + 0.5) * params.driftRadius;
            const z = Math.cos(t * params.driftFreqZ)        * params.driftRadius * 0.75;
            group.position.set(x, y, z);

            // Tilt gently in the direction of horizontal drift
            group.rotation.z = Math.sin(t * params.driftFreqX + 0.5) * 0.12;
            group.rotation.x = Math.sin(t * params.driftFreqZ)        * 0.08;

            // Bell pulse — scale the mesh slightly so it looks like it's contracting
            const pulse = 1.0 + Math.sin(t * params.pulseFreq) * 0.10;
            root.scale.setScalar((params.scale ?? 0.13) * pulse);
        }

        if (behavior === 'crab') {
            inst.phase += params.speed * delta;
            const cx = Math.sin(inst.phase) * params.xRange;
            group.position.set(cx, params.floorY, params.z);

            // Face the direction of movement — flip when reversing
            const moving = Math.cos(inst.phase); // positive = moving right
            group.rotation.y = faceOffset + (moving > 0 ? Math.PI * 0.5 : -Math.PI * 0.5);

            // Slight sideways waddle
            root.rotation.z = Math.sin(inst.phase * 4) * 0.08;
        }

        mixer.update(delta);
    });

    controls.update();
    renderer.render(scene, camera);
}

animate();

// ─────────────────────────────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
