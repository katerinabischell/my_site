<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishbowl</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #040d1a;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        canvas { display: block; }

        /* ── Loading screen ── */
        #loading {
            position: fixed;
            inset: 0;
            background: #040d1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.9s ease;
        }
        #loading.fade-out { opacity: 0; pointer-events: none; }

        .loader-title {
            color: #7dd8e0;
            font-size: 1.3rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }
        .progress-bar {
            width: 180px;
            height: 1.5px;
            background: rgba(125, 216, 224, 0.18);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #7dd8e0;
            width: 0%;
            transition: width 0.25s ease;
        }
        .loader-sub {
            color: rgba(125, 216, 224, 0.35);
            font-size: 0.7rem;
            letter-spacing: 0.18em;
            margin-top: 1.4rem;
        }

        /* ── Controls hint ── */
        #hint {
            position: fixed;
            bottom: 1.6rem;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.28);
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            pointer-events: none;
            transition: opacity 1.2s ease;
            white-space: nowrap;
        }
        #hint.gone { opacity: 0; }
    </style>
</head>
<body>

<div id="loading">
    <div class="loader-title">Fishbowl</div>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="loader-sub" id="loader-sub">Loading scene…</div>
</div>

<div id="hint">drag to look around &nbsp;·&nbsp; scroll to zoom</div>

<!-- Three.js import map — no build step needed -->
<script type="importmap">
{
    "imports": {
        "three":          "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─────────────────────────────────────────────────────────────────
// RENDERER
// ─────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping        = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.outputColorSpace   = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ─────────────────────────────────────────────────────────────────
// SCENE
// ─────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x061520);

// Exponential fog approximates the Volume Scatter water —
// objects farther away fade into teal murk
scene.fog = new THREE.FogExp2(0x0c3040, 0.30);

// ─────────────────────────────────────────────────────────────────
// CAMERA
// ─────────────────────────────────────────────────────────────────
// Blender uses Z-up. GLTF/Three.js uses Y-up.
// The GLTF exporter converts coordinates: Blender(x,y,z) → Three.js(x, z, -y)
//
// Blender cam position  (0, -1.50,  0.05) → Three.js (0,  0.05,  1.50)
// Blender look target  (0.15, 0.80, -0.45) → Three.js (0.15, -0.45, -0.80)
const camera = new THREE.PerspectiveCamera(
    60,                                    // FOV (Blender was 24mm ≈ 73°, we soften to 60)
    window.innerWidth / window.innerHeight,
    0.01,
    100
);
camera.position.set(0, 0.05, 1.50);

// ─────────────────────────────────────────────────────────────────
// ORBIT CONTROLS — user orbits from inside the bowl
// ─────────────────────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0.15, -0.45, -0.80);
controls.enableDamping  = true;
controls.dampingFactor  = 0.055;
controls.rotateSpeed    = 0.45;
controls.zoomSpeed      = 0.65;
controls.minDistance    = 0.05;   // can get nose-close to seaweed
controls.maxDistance    = 1.70;   // bowl interior radius ~1.88 — stay inside
controls.update();

// ─────────────────────────────────────────────────────────────────
// LIGHTING  (approximates the Cycles light rig)
// ─────────────────────────────────────────────────────────────────

// Ambient — deep underwater fill
const ambient = new THREE.AmbientLight(0x183c50, 2.2);
scene.add(ambient);

// Main "sun" from above — stands in for Godray_Spot
const sun = new THREE.DirectionalLight(0xa8ddf0, 3.5);
sun.position.set(1.2, 5.0, 0.8);
scene.add(sun);

// Secondary fill from opposite side — stands in for Soft_Shaft
const fill = new THREE.DirectionalLight(0x3a7a99, 1.4);
fill.position.set(-1.0, 3.0, -1.0);
scene.add(fill);

// Floor warm light (Floor_Light)
const floorLight = new THREE.PointLight(0xffe0a0, 5.0, 3.2);
floorLight.position.set(0.15, -1.05, -0.45);
scene.add(floorLight);

// Floor left — green tint for moss (Floor_Light_L)
const floorLightL = new THREE.PointLight(0x70dd99, 3.0, 2.8);
floorLightL.position.set(-0.45, -1.10, -0.20);
scene.add(floorLightL);

// Coral glow lights
const coralO = new THREE.PointLight(0xff6010, 2.2, 1.8);
coralO.position.set(0.40, -1.20, -0.25);
scene.add(coralO);

const coralP = new THREE.PointLight(0xff40aa, 2.0, 1.8);
coralP.position.set(-0.20, -1.20, -0.20);
scene.add(coralP);

// ─────────────────────────────────────────────────────────────────
// FAKE GOD RAYS
// Additive back-face cones — cheap volumetric shaft look
// ─────────────────────────────────────────────────────────────────
function makeRay(hexColor, x, z, height, radius, opacity) {
    const geo = new THREE.ConeGeometry(radius, height, 10, 1, true);
    const mat = new THREE.MeshBasicMaterial({
        color:      hexColor,
        transparent: true,
        opacity,
        side:       THREE.BackSide,
        depthWrite: false,
        blending:   THREE.AdditiveBlending,
    });
    const cone = new THREE.Mesh(geo, mat);
    // Tip at top of bowl, wide end pointing down
    cone.rotation.z = Math.PI;
    cone.position.set(x, height * 0.5 - 0.1, z);
    return cone;
}

const ray1 = makeRay(0x38b8d0, 0.25, -0.30, 3.6, 0.38, 0.045);
const ray2 = makeRay(0x58d0e0, -0.25, -0.10, 3.3, 0.28, 0.032);
const ray3 = makeRay(0x78e0f0, 0.55, -0.55, 3.0, 0.22, 0.028);
scene.add(ray1, ray2, ray3);

// ─────────────────────────────────────────────────────────────────
// FISH CONFIG
// Tweak these if fish are too big/small or face the wrong way
// ─────────────────────────────────────────────────────────────────
const FISH_SCALE       = 0.07;  // 30% smaller than before
const FISH_FACE_OFFSET = 0;     // 0 = forward, Math.PI = flip if backwards

// Single fish — near the tank floor, slow wandering path
const FISH_ORBITS = [
    { radius: 0.52, baseY: -0.92, speed: 0.22, startAngle: 0.0 },
];

// Live fish objects — populated after the GLB loads
const fishInstances = [];   // { group, mixer, orbit }
const mixers        = [];

// ─────────────────────────────────────────────────────────────────
// LOAD GLB — scene first, then fish
// ─────────────────────────────────────────────────────────────────
const progressEl = document.getElementById('progress');
const loadingEl  = document.getElementById('loading');
const subEl      = document.getElementById('loader-sub');

// Fade out loading screen — called on success or error
let fadedOut = false;
function fadeOut() {
    if (fadedOut) return;
    fadedOut = true;
    progressEl.style.width = '100%';
    setTimeout(() => {
        loadingEl.classList.add('fade-out');
        setTimeout(() => { loadingEl.style.display = 'none'; }, 950);
    }, 300);
    setTimeout(() => document.getElementById('hint').classList.add('gone'), 6000);
}

// Hard failsafe — if nothing loads within 20s, show whatever we have
setTimeout(fadeOut, 20000);

const loader = new GLTFLoader();

loader.load(
    'fishbowl.glb',
    (gltf) => {
        scene.add(gltf.scene);

        // Post-process materials exported from Blender
        gltf.scene.traverse((obj) => {
            if (!obj.isMesh) return;
            const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
            mats.forEach(m => {
                if (m.transparent) m.depthWrite = false;
                if (m.emissive) {
                    const e = m.emissiveIntensity ?? 1.0;
                    m.emissiveIntensity = Math.min(e * 2.8, 4.0);
                }
                if (obj.name.toLowerCase().includes('seaweed')) {
                    m.side = THREE.DoubleSide;
                }
            });
        });

        // Scene loaded — now load each fish independently
        // (browser caches the GLB so it only downloads once)
        subEl.textContent = 'Loading fish…';
        let fishLoaded = 0;

        FISH_ORBITS.forEach((orbit, i) => {
            const fishLoader = new GLTFLoader();
            fishLoader.load(
                'shiny_fish.glb',
                (fishGltf) => {
                    const root = fishGltf.scene;
                    root.scale.setScalar(FISH_SCALE);
                    root.rotation.y = FISH_FACE_OFFSET;

                    const group = new THREE.Group();
                    group.add(root);
                    scene.add(group);

                    // Play swim animation if the model has one
                    const mixer = new THREE.AnimationMixer(root);
                    if (fishGltf.animations.length > 0) {
                        fishGltf.animations.forEach(clip => {
                            const action = mixer.clipAction(clip);
                            action.time = i * 0.4; // stagger so they don't flap in sync
                            action.play();
                        });
                    }
                    mixers.push(mixer);

                    fishInstances.push({
                        group,
                        root,   // keep ref so we can wiggle the body
                        mixer,
                        orbit: { ...orbit, angle: orbit.startAngle },
                    });

                    fishLoaded++;
                    if (fishLoaded === FISH_ORBITS.length) fadeOut();
                },
                null,
                (err) => {
                    console.warn('shiny_fish.glb skipped:', err);
                    fishLoaded++;
                    if (fishLoaded === FISH_ORBITS.length) fadeOut();
                }
            );
        });
    },
    (xhr) => {
        if (xhr.total) {
            progressEl.style.width = ((xhr.loaded / xhr.total) * 90) + '%'; // save last 10% for fish
        }
    },
    (err) => {
        console.error('fishbowl.glb load error:', err);
        subEl.textContent = 'Could not load fishbowl.glb — make sure you\'re using a local server (python3 -m http.server 8000).';
        subEl.style.color = '#ff8080';
    }
);

// ─────────────────────────────────────────────────────────────────
// ANIMATION LOOP
// ─────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

// Reusable vectors — avoids garbage collection in the loop
const _nextPos = new THREE.Vector3();

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    const t     = clock.elapsedTime;

    // ── Lights pulse ──
    coralO.intensity     = 2.2 + Math.sin(t * 1.30) * 0.45;
    coralP.intensity     = 2.0 + Math.sin(t * 0.90 + 1.1) * 0.40;
    floorLight.intensity = 5.0 + Math.sin(t * 0.55) * 0.35;

    // ── God ray drift ──
    ray1.rotation.y = Math.sin(t * 0.28) * 0.06;
    ray2.rotation.y = Math.sin(t * 0.22 + 0.9) * 0.05;
    ray3.rotation.y = Math.sin(t * 0.34 + 1.8) * 0.07;

    // ── Fish: wander near the tank floor + procedural body wiggle ──
    fishInstances.forEach(({ group, root, mixer, orbit }) => {
        orbit.angle += orbit.speed * delta;
        const a = orbit.angle;

        // Wandering figure-8 style path — two overlapping sine waves so it
        // never feels like a perfect circle
        const x = Math.cos(a)        * orbit.radius
                + Math.cos(a * 0.7 + 1.0) * 0.20;
        const z = Math.sin(a * 1.1)  * orbit.radius
                + Math.sin(a * 0.5)  * 0.18;
        // Gentle floor-hugging vertical drift
        const y = orbit.baseY + Math.sin(a * 1.6) * 0.10;
        group.position.set(x, y, z);

        // Point the group toward where it will be a moment later
        const ahead = a + 0.12;
        _nextPos.set(
            Math.cos(ahead)        * orbit.radius + Math.cos(ahead * 0.7 + 1.0) * 0.20,
            y,
            Math.sin(ahead * 1.1)  * orbit.radius + Math.sin(ahead * 0.5) * 0.18
        );
        group.lookAt(_nextPos);

        // Procedural body undulation — sine wave on the fish mesh's Y rotation
        // This gives the tail-wag even when the baked animation is subtle
        root.rotation.y = FISH_FACE_OFFSET + Math.sin(t * 3.8) * 0.28;

        mixer.update(delta);
    });

    controls.update();
    renderer.render(scene, camera);
}

animate();

// ─────────────────────────────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
